name: Backup to Google Drive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Zip repository
        run: |
          zip -r repo.zip . -x "*.git*"

      - name: Install gdrive
        run: |
          wget https://github.com/prasmussen/gdrive/releases/download/2.1.0/gdrive-linux-x64
          mv gdrive-linux-x64 gdrive
          chmod +x gdrive

      - name: Authenticate
        run: |
          printf '%s' '${{ secrets.GDRIVE_CREDENTIALS }}' > creds.json

      - name: Upload
        run: |
          ./gdrive upload --parent ${{ secrets.GDRIVE_FOLDER_ID }} repo.zip
